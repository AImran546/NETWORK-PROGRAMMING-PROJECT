---
- name: Backup device config
  hosts: devices
  become: yes
  tasks:
    - name: Ensure backup dir
      file:
        path: /tmp/backups
        state: directory
    - name: Backup interfaces
      shell: ip addr show > /tmp/backups/interfaces_{{ inventory_hostname }}.txt
    - name: Backup routes
      shell: ip route > /tmp/backups/routes_{{ inventory_hostname }}.txt
    - name: Fetch backups to host
      fetch:
        src: /tmp/backups/interfaces_{{ inventory_hostname }}.txt
        dest: ./backups/
        flat: yes
